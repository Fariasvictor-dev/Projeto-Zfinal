<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Gravitação Z — Fase 2B</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#04040e;overflow:hidden;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;font-family:'Share Tech Mono',monospace;}
body::before{content:'';position:fixed;inset:0;background:repeating-linear-gradient(to bottom,transparent 0,transparent 2px,rgba(0,0,0,.07) 2px,rgba(0,0,0,.07) 4px);pointer-events:none;z-index:999;}
header{display:flex;align-items:center;gap:1rem;margin-bottom:.5rem}
header h1{font-family:'Orbitron',sans-serif;font-weight:900;font-size:1.2rem;letter-spacing:.3em;color:#ffe566;text-shadow:0 0 10px #ffe566;}
.badge{font-size:.48rem;letter-spacing:.12em;padding:2px 8px;border:1px solid #00e5ff;color:#00e5ff}
.canvas-wrapper{position:relative;border:2px solid #1e2a3a;box-shadow:0 0 50px rgba(0,180,255,.15)}
canvas{display:block}
.back-btn{position:fixed;top:12px;left:14px;font-family:'Press Start 2P',monospace;font-size:.5rem;color:#2a4a6a;text-decoration:none;border:1px solid #1a2a3a;padding:5px 10px;z-index:50;transition:.2s;}
.back-btn:hover{color:#00e5ff;border-color:#00e5ff}
#OVL{position:absolute;inset:0;display:none;align-items:center;justify-content:center;flex-direction:column;z-index:40;background:rgba(0,0,0,.9);}
#OVL.vis{display:flex;animation:fi .3s ease}
@keyframes fi{from{opacity:0}to{opacity:1}}
.ob{border:2px solid #ffe566;background:rgba(4,4,22,.98);padding:24px 36px;text-align:center;max-width:460px;box-shadow:0 0 40px rgba(255,229,100,.15);}
.ot{font-family:'Orbitron',sans-serif;font-size:.85rem;color:#ffe566;letter-spacing:.2em;margin-bottom:12px;}
.ox{font-size:.54rem;color:#c8d8e8;line-height:2;margin-bottom:16px;}
.btn{font-family:'Press Start 2P',monospace;font-size:.5rem;background:transparent;border:2px solid #ffe566;color:#ffe566;padding:9px 18px;cursor:pointer;letter-spacing:.1em;transition:.2s;margin:3px;display:inline-block;}
.btn:hover{background:rgba(255,229,100,.1);}
.btn.b{border-color:#00e5ff;color:#00e5ff;}
.btn.r{border-color:#ff4081;color:#ff4081;}
</style>
</head>
<body>
<a class="back-btn" href="mapa.html">◀ MAPA</a>
<header><h1>GRAVITAÇÃO Z</h1><span class="badge">FASE 2B · ÓRBITAS ELÍPTICAS</span></header>
<div class="canvas-wrapper">
  <canvas id="GC" width="800" height="550"></canvas>
  <div id="OVL">
    <div class="ob">
      <div class="ot" id="OT">🪐 ÓRBITAS</div>
      <div class="ox" id="OX"></div>
      <div id="OB"></div>
    </div>
  </div>
</div>
<script src="shared.js"></script>
<script src="audio.js"></script>
<script>
// ── SETUP ─────────────────────────────────────────────
const GC = document.getElementById('GC');
const ctx = GC.getContext('2d');
const W=800, H=550;

// Estrelas
const STARS = Array.from({length:240},()=>({
  x:Math.random()*W, y:Math.random()*H,
  r:Math.random()*1.4+.2,
  t:Math.random()*Math.PI*2, s:Math.random()*.018+.004
}));

// ── 4 NÍVEIS ──────────────────────────────────────────
// Cada nível: sol, origem, destino(s)
// periX/Y = posição do periélio (perto do sol) para destacar
const NIVEIS = [
  {
    id:1,
    titulo:'NÍVEL 1 — PRIMEIRO SALTO',
    desc:'Sua lua orbita um planeta.\n\n🐢 <b style="color:#00e5ff">AFÉLIO</b> = longe do Sol = <b>DEVAGAR</b>\n⚡ <b style="color:#ff6644">PERIÉLIO</b> = perto do Sol = <b>RÁPIDO</b>\n\nA lua ficará <b style="color:#00e5ff">AZUL e piscando</b> no afélio.\n<b style="color:#ffe566">Pressione ESPAÇO</b> para saltar!',
    // Nível 1: circular — Sol levemente deslocado para mostrar o conceito
    sol:{x:240,y:275,r:20},       // Sol dentro da órbita, à direita do planeta
    planetas:[
      {x:200,y:275,r:32,cor:'#44eebb',corL:'#88ffdd',sombra:'#0a5533',ring:false,nome:'ORIGEM'},
      {x:620,y:275,r:28,cor:'#e5ff00',corL:'#ccff66',sombra:'#334400',ring:false,nome:'DESTINO'},
    ],
    lua:{rx:90,ry:90,vel:.026},   // circular — afélio = qualquer lado oposto ao sol
  },
  {
    id:2,
    titulo:'NÍVEL 2 — ÓRBITA ELÍPTICA',
    desc:'Agora a órbita é <b style="color:#ffe566">ELÍPTICA</b>!\nO Sol está num dos <b>focos</b> da elipse.\n\n⚡ Perto do Sol (direita) → <b style="color:#ff6644">RÁPIDO</b>\n🐢 Longe do Sol (esquerda) → <b style="color:#00e5ff">DEVAGAR</b>\n\nEspere a lua ficar <b style="color:#00e5ff">azul</b> e pule!',
    // Nível 2: elipse clara — Sol no foco correto (dentro da órbita)
    // Planeta em x:200, rx:95, ry:55 → foco=77 → Sol em x:277
    sol:{x:277,y:280,r:24},
    planetas:[
      {x:200,y:280,r:30,cor:'#ffaa55',corL:'#ffdd99',sombra:'#553300',ring:false,nome:'ORIGEM'},
      {x:630,y:255,r:26,cor:'#4488ff',corL:'#88bbff',sombra:'#112266',ring:true,ringCor:'rgba(100,160,255,.5)',nome:'DESTINO'},
    ],
    lua:{rx:95,ry:55,vel:.024},   // elipse bem visível
  },
  {
    id:3,
    titulo:'NÍVEL 3 — DOIS SALTOS',
    desc:'Desta vez há <b style="color:#ffe566">dois planetas</b> para alcançar!\nSalte para o <b style="color:#ff4081">vermelho</b>, depois para o <b style="color:#88eeff">azul</b>.\n\nSempre no afélio — quando piscar!',
    // Planeta em x:170, rx:75, ry:48 → foco=58 → Sol em x:228
    sol:{x:228,y:275,r:20},
    planetas:[
      {x:170,y:275,r:26,cor:'#44eebb',corL:'#88ffdd',sombra:'#0a5533',ring:false,nome:'INÍCIO'},
      {x:440,y:175,r:22,cor:'#ff4081',corL:'#ff88bb',sombra:'#550022',ring:false,nome:'1º DESTINO'},
      {x:660,y:310,r:24,cor:'#88eeff',corL:'#ccffff',sombra:'#113344',ring:true,ringCor:'rgba(136,238,255,.5)',nome:'2º DESTINO'},
    ],
    lua:{rx:75,ry:48,vel:.030},
  },
  {
    id:4,
    titulo:'NÍVEL 4 — SATURNO',
    desc:'Um gigante com anéis!\nVeja como a lua <b style="color:#ff6644">acelera</b> no periélio.\n\nCalma e espere o <b style="color:#00e5ff">afélio</b> para saltar!',
    // Planeta em x:175, rx:80, ry:46 → foco=65 → Sol em x:240
    sol:{x:240,y:275,r:24},
    planetas:[
      {x:175,y:275,r:24,cor:'#44eebb',corL:'#88ffdd',sombra:'#0a5533',ring:false,nome:'INÍCIO'},
      {x:460,y:275,r:40,cor:'#eecc88',corL:'#ffee99',sombra:'#554400',ring:true,ringCor:'rgba(238,204,136,.7)',nome:'SATURNO'},
      {x:680,y:245,r:20,cor:'#ff4081',corL:'#ff88bb',sombra:'#550022',ring:false,nome:'DESTINO'},
    ],
    lua:{rx:80,ry:46,vel:.028},
  },
];

// ── ESTADO DO JOGO ─────────────────────────────────────
let gameState='MENU';
let nivelAtual=0, planetaAtual=0, vidas=3;
let luaAng=Math.PI; // começa no afélio
let particulas=[];
let ticks=0;
let nivelMax=0;

// ── OVERLAY ────────────────────────────────────────────
function showOvl(titulo,html,btns){
  document.getElementById('OT').textContent=titulo;
  document.getElementById('OX').innerHTML=html.replace(/\n/g,'<br>');
  const bd=document.getElementById('OB');
  bd.innerHTML='';
  btns.forEach(b=>{
    const el=document.createElement('button');
    el.className='btn'+(b.cls?' '+b.cls:'');
    el.textContent=b.label;
    el.onclick=b.fn;
    bd.appendChild(el);
  });
  document.getElementById('OVL').classList.add('vis');
}
function hideOvl(){ document.getElementById('OVL').classList.remove('vis'); }

// ── INICIAR NÍVEL ──────────────────────────────────────
function startNivel(n){
  nivelAtual=n; planetaAtual=0; vidas=3;
  luaAng=Math.PI; // começa no afélio
  particulas=[];
  gameState='PLAYING';
  hideOvl();
  GZ_Audio&&GZ_Audio.entradaFase();
}

function showTutorial(n){
  const nv=NIVEIS[n];
  showOvl(nv.titulo, nv.desc, [
    {label:'▶ JOGAR', fn:()=>startNivel(n)},
    ...(n>0?[{label:'◀ NÍVEIS', cls:'b', fn:()=>showSelecao()}]:[]),
  ]);
}

function showSelecao(){
  gameState='MENU';
  let html='<div style="display:flex;gap:10px;justify-content:center;margin-bottom:12px">';
  NIVEIS.forEach((nv,i)=>{
    const ok=i<=nivelMax;
    html+=`<div onclick="${ok?'selNivel('+i+')':''}" style="border:1px solid ${ok?'#ffe566':'#2a3a4a'};padding:8px 12px;cursor:${ok?'pointer':'default'};opacity:${ok?1:.4};font-family:'Press Start 2P';font-size:.45rem;color:${ok?'#ffe566':'#556677'}">
      <div>N${i+1}</div>
      <div style="font-size:.35rem;color:${i<nivelMax?'#44eebb':'#556677'};margin-top:3px">${i<nivelMax?'✓':i===nivelMax?'★':'🔒'}</div>
    </div>`;
  });
  html+='</div><p style="font-size:.48rem;color:#4a5a6a">Clique num nível para jogar</p>';
  showOvl('SELECIONAR NÍVEL', html, [
    {label:'◀ MAPA', cls:'r', fn:()=>{window.location.href='mapa.html';}},
  ]);
}
function selNivel(n){ nivelAtual=n; showTutorial(n); }

// ── FÍSICA ─────────────────────────────────────────────
function getLuaPos(){
  const nv=NIVEIS[nivelAtual];
  const p=nv.planetas[Math.min(planetaAtual,nv.planetas.length-1)];
  const lx=p.x+Math.cos(luaAng)*nv.lua.rx;
  const ly=p.y+Math.sin(luaAng)*nv.lua.ry;
  return {x:lx,y:ly};
}

function getVelFator(){
  // 2ª Lei de Kepler: v ∝ 1/distância ao Sol
  const nv=NIVEIS[nivelAtual];
  const sol=nv.sol;
  const lp=getLuaPos();
  const dist=Math.hypot(lp.x-sol.x,lp.y-sol.y);
  // Distância máxima possível nesta órbita
  const maxDist=nv.lua.rx+nv.lua.ry;
  // Fator: mais longe = mais lento
  return Math.max(0.3, Math.min(2.5, (maxDist*0.9)/Math.max(dist,30)));
}

function isAfelio(){
  if(gameState!=='PLAYING') return false;
  const nv=NIVEIS[nivelAtual];
  const pIdx=Math.min(planetaAtual,nv.planetas.length-1);
  const sol=nv.sol;
  const lp=getLuaPos();
  const dist=Math.hypot(lp.x-sol.x,lp.y-sol.y);
  let maxD=0;
  for(let a=0;a<Math.PI*2;a+=.05){
    const tx=nv.planetas[pIdx].x+Math.cos(a)*nv.lua.rx;
    const ty=nv.planetas[pIdx].y+Math.sin(a)*nv.lua.ry;
    maxD=Math.max(maxD,Math.hypot(tx-sol.x,ty-sol.y));
  }
  return dist>maxD*.82;
}

// ── SALTO ──────────────────────────────────────────────
function tentarSalto(){
  if(gameState!=='PLAYING') return;
  if(isAfelio()){
    // Sucesso!
    GZ_Audio&&GZ_Audio.missaoDesbloqueada&&GZ_Audio.missaoDesbloqueada();
    boom(getLuaPos().x,getLuaPos().y,'#44eebb',14);
    boom(getLuaPos().x,getLuaPos().y,'#00e5ff',8);
    planetaAtual++;
    if(planetaAtual>=NIVEIS[nivelAtual].planetas.length){
      setTimeout(()=>nivelCompleto(),400);
    } else {
      luaAng=Math.PI; // reinicia no afélio do próximo planeta
    }
  } else {
    // Erro!
    vidas--;
    GZ_Audio&&GZ_Audio.socoNormal&&GZ_Audio.socoNormal();
    boom(getLuaPos().x,getLuaPos().y,'#ff4444',12);
    if(vidas<=0){
      setTimeout(()=>showOvl('✗ SEM VIDAS!',
        'Lembre: pule SOMENTE quando a lua\nficar <b style="color:#00e5ff">AZUL</b> e piscar (afélio)!',
        [{label:'↺ TENTAR NOVAMENTE',fn:()=>startNivel(nivelAtual)},
         {label:'◀ NÍVEIS',cls:'b',fn:()=>showSelecao()}]
      ),400);
    }
  }
}

function nivelCompleto(){
  GZ_Audio&&GZ_Audio.vitoria&&GZ_Audio.vitoria();
  if(nivelAtual>=nivelMax) nivelMax=nivelAtual+1;
  const ultimo=nivelAtual===NIVEIS.length-1;
  if(ultimo){
    const p=typeof carregarProgresso==='function'?carregarProgresso():{};
    p.missao2b_unlocked=true;
    p.missao3_unlocked=true;
    if(typeof salvarProgresso==='function') salvarProgresso(p);
  }
  showOvl('✦ NÍVEL '+(nivelAtual+1)+' COMPLETO!',
    ultimo
      ?'🎉 Você dominou as Órbitas Elípticas!\n<span style="color:#44eebb">Missão 2B completa!</span>'
      :'No <b style="color:#00e5ff">afélio</b> você está mais distante e mais devagar.\nEsse é o momento certo para saltar!',
    [
      ...(!ultimo?[{label:'PRÓXIMO NÍVEL ▶',fn:()=>{nivelAtual++;showTutorial(nivelAtual);}}]:[]),
      ...(ultimo?[{label:'VOLTAR AO MAPA',fn:()=>{window.location.href='mapa.html';}}]:[]),
      {label:'↺ REPETIR',cls:'b',fn:()=>startNivel(nivelAtual)},
    ]
  );
}

function boom(x,y,cor,n){
  for(let i=0;i<n;i++) particulas.push({
    x,y,vx:(Math.random()-.5)*7,vy:(Math.random()-.5)*7-1.5,
    vida:35,maxVida:50,cor,r:Math.random()*4+2
  });
}

// ── DESENHO 3D ─────────────────────────────────────────
function drawStars(){
  STARS.forEach(s=>{
    s.t+=s.s;
    ctx.fillStyle=`rgba(200,220,255,${.1+Math.sin(s.t)*.12})`;
    ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);ctx.fill();
  });
}

function drawSol(sx,sy,sr){
  // Coroa
  for(let i=0;i<8;i++){
    const a=i*Math.PI/4+ticks*.008;
    const l=sr+12+Math.sin(ticks*.04+i)*6;
    ctx.save();ctx.globalAlpha=.1+Math.sin(ticks*.04+i)*.07;
    ctx.strokeStyle='#ffcc44';ctx.lineWidth=3;
    ctx.beginPath();ctx.moveTo(sx+Math.cos(a)*sr,sy+Math.sin(a)*sr);
    ctx.lineTo(sx+Math.cos(a)*l,sy+Math.sin(a)*l);ctx.stroke();ctx.restore();
  }
  // Halo
  const gh=ctx.createRadialGradient(sx,sy,sr*.5,sx,sy,sr*3.5);
  gh.addColorStop(0,'rgba(255,200,0,.3)');gh.addColorStop(.5,'rgba(255,120,0,.08)');gh.addColorStop(1,'transparent');
  ctx.fillStyle=gh;ctx.beginPath();ctx.arc(sx,sy,sr*3.5,0,Math.PI*2);ctx.fill();
  // Corpo
  const gs=ctx.createRadialGradient(sx-sr*.35,sy-sr*.38,sr*.05,sx,sy,sr);
  gs.addColorStop(0,'#fffacc');gs.addColorStop(.4,'#ffcc00');
  gs.addColorStop(.8,'#ff8800');gs.addColorStop(1,'#cc4400');
  ctx.beginPath();ctx.arc(sx,sy,sr,0,Math.PI*2);ctx.fillStyle=gs;ctx.fill();
  // Manchas
  ctx.save();ctx.beginPath();ctx.arc(sx,sy,sr,0,Math.PI*2);ctx.clip();
  ctx.fillStyle='rgba(150,60,0,.3)';
  ctx.beginPath();ctx.arc(sx+sr*.25,sy-sr*.18,sr*.18,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(sx-sr*.3,sy+sr*.28,sr*.14,0,Math.PI*2);ctx.fill();
  ctx.restore();
  // Label
  ctx.font="6px 'Share Tech Mono'";ctx.fillStyle='rgba(255,200,0,.7)';ctx.textAlign='center';
  ctx.fillText('SOL',sx,sy+sr+12);
}

function drawOrbita(px,py,rx,ry,cor,lw){
  ctx.save();ctx.strokeStyle=cor||'rgba(100,150,255,.2)';
  ctx.lineWidth=lw||1;ctx.setLineDash([5,8]);
  ctx.beginPath();ctx.ellipse(px,py,rx,ry,0,0,Math.PI*2);ctx.stroke();
  ctx.setLineDash([]);ctx.restore();
}

function drawPlaneta(px,py,r,cor,corL,sombra,ring,ringCor,ativo){
  // Sombra
  const gsh=ctx.createRadialGradient(px+r*.25,py+r*.25,r*.1,px+r*.25,py+r*.25,r*1.7);
  gsh.addColorStop(0,'rgba(0,0,0,.22)');gsh.addColorStop(1,'transparent');
  ctx.fillStyle=gsh;ctx.beginPath();ctx.arc(px+r*.25,py+r*.25,r*1.7,0,Math.PI*2);ctx.fill();

  // Anel traseiro
  if(ring){
    ctx.save();ctx.translate(px,py);ctx.scale(1,.28);ctx.rotate(.3);
    const gr=ctx.createRadialGradient(0,0,r*.8,0,0,r*2);
    gr.addColorStop(0,ringCor||'rgba(200,180,100,.5)');gr.addColorStop(1,'transparent');
    ctx.fillStyle=gr;ctx.beginPath();ctx.arc(0,0,r*2,0,Math.PI*2);ctx.fill();
    ctx.strokeStyle=ringCor||'rgba(200,180,100,.45)';ctx.lineWidth=r*.3;
    ctx.beginPath();ctx.arc(0,0,r*1.4,0,Math.PI*2);ctx.stroke();ctx.restore();
  }

  // Corpo 3D
  const g3=ctx.createRadialGradient(px-r*.38,py-r*.38,r*.04,px,py,r);
  g3.addColorStop(0,corL);g3.addColorStop(.4,cor);
  g3.addColorStop(.82,sombra);g3.addColorStop(1,'rgba(0,0,0,.85)');
  ctx.beginPath();ctx.arc(px,py,r,0,Math.PI*2);ctx.fillStyle=g3;ctx.fill();

  // Faixas atmosféricas
  ctx.save();ctx.beginPath();ctx.arc(px,py,r,0,Math.PI*2);ctx.clip();
  for(let i=0;i<4;i++){
    ctx.beginPath();ctx.ellipse(px,py-r*.5+i*r*.38,r*.92,r*.06+.02*(i%2),.08,0,Math.PI*2);
    ctx.fillStyle=`rgba(0,0,0,.07)`;ctx.fill();
  }
  ctx.fillStyle='rgba(255,255,255,.07)';
  ctx.beginPath();ctx.ellipse(px-r*.28,py-r*.18,r*.28,r*.08,.2,0,Math.PI*2);ctx.fill();
  ctx.restore();

  // Brilho especular
  const gb=ctx.createRadialGradient(px-r*.36,py-r*.38,0,px-r*.36,py-r*.38,r*.6);
  gb.addColorStop(0,'rgba(255,255,255,.3)');gb.addColorStop(1,'transparent');
  ctx.save();ctx.beginPath();ctx.arc(px,py,r,0,Math.PI*2);ctx.clip();
  ctx.fillStyle=gb;ctx.fillRect(px-r,py-r,r*2,r*2);ctx.restore();

  // Glow se destino atual
  if(ativo){
    const p=.5+Math.sin(ticks*.07)*.5;
    ctx.beginPath();ctx.arc(px,py,r+5+p*4,0,Math.PI*2);
    ctx.strokeStyle=cor+'99';ctx.lineWidth=2+p;ctx.stroke();
  }
}

function drawLua(lx,ly,r,cor,noAfelio,isPlayer){
  // Glow afélio — AZUL FORTE e piscante
  if(noAfelio){
    const p=.5+Math.abs(Math.sin(ticks*.18))*.5;
    const gg=ctx.createRadialGradient(lx,ly,r*.5,lx,ly,r*4);
    gg.addColorStop(0,`rgba(0,229,255,${p*.6})`);gg.addColorStop(1,'transparent');
    ctx.fillStyle=gg;ctx.beginPath();ctx.arc(lx,ly,r*4,0,Math.PI*2);ctx.fill();
    // Anel pulsante duplo
    for(let ri=0;ri<2;ri++){
      ctx.beginPath();ctx.arc(lx,ly,r+5+ri*5+p*6,0,Math.PI*2);
      ctx.strokeStyle=`rgba(0,229,255,${p*(ri===0?.8:.4)})`;ctx.lineWidth=2-ri*.5;ctx.stroke();
    }
  }

  // Corpo 3D
  const corAtual=noAfelio?'#aaffff':cor;
  const corSombra=noAfelio?'#003355':'#1a2233';
  const gl=ctx.createRadialGradient(lx-r*.35,ly-r*.38,r*.04,lx,ly,r);
  gl.addColorStop(0,noAfelio?'#ffffff':corAtual);
  gl.addColorStop(.4,noAfelio?'#44ffff':cor);
  gl.addColorStop(.85,corSombra);gl.addColorStop(1,'rgba(0,0,0,.8)');
  ctx.beginPath();ctx.arc(lx,ly,r,0,Math.PI*2);ctx.fillStyle=gl;ctx.fill();

  // Crateras
  ctx.save();ctx.beginPath();ctx.arc(lx,ly,r,0,Math.PI*2);ctx.clip();
  [[lx+r*.2,ly-r*.15,r*.24],[lx-r*.3,ly+r*.22,r*.18]].forEach(([cx,cy,cr])=>{
    ctx.fillStyle='rgba(0,0,0,.2)';ctx.beginPath();ctx.arc(cx,cy,cr,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='rgba(255,255,255,.05)';ctx.beginPath();ctx.arc(cx-.5,cy-.5,cr*.55,0,Math.PI*2);ctx.fill();
  });
  ctx.restore();

  // Brilho especular
  const gb=ctx.createRadialGradient(lx-r*.32,ly-r*.35,0,lx-r*.32,ly-r*.35,r*.52);
  gb.addColorStop(0,'rgba(255,255,255,.38)');gb.addColorStop(1,'transparent');
  ctx.save();ctx.beginPath();ctx.arc(lx,ly,r,0,Math.PI*2);ctx.clip();
  ctx.fillStyle=gb;ctx.fillRect(lx-r,ly-r,r*2,r*2);ctx.restore();

  // Astronauta
  if(isPlayer){
    const ax=lx, ay=ly-r-11;
    ctx.save();ctx.translate(ax,ay);
    ctx.fillStyle='rgba(0,0,0,.3)';ctx.beginPath();ctx.ellipse(0,8,7,2.5,0,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#dd2211';ctx.fillRect(-5,3,4,7);ctx.fillRect(1,3,4,7);
    ctx.fillStyle='#2255dd';ctx.fillRect(-6,-5,12,9);
    ctx.fillStyle='#ffaa00';ctx.fillRect(-6,3,12,2);
    ctx.fillStyle='#bbcced';ctx.fillRect(-5,-13,10,9);
    ctx.fillStyle='rgba(160,220,255,.8)';ctx.fillRect(-3,-12,7,6);
    ctx.fillStyle='rgba(255,255,255,.5)';ctx.fillRect(-2,-11,2,2);
    ctx.strokeStyle='#aabbff';ctx.lineWidth=1.2;
    ctx.beginPath();ctx.moveTo(3,-13);ctx.lineTo(5,-20);ctx.stroke();
    ctx.fillStyle='#ff4488';ctx.beginPath();ctx.arc(5,-20,1.8,0,Math.PI*2);ctx.fill();
    ctx.restore();
  }
}

function drawVelIndicator(lx,ly,velFator,noAfelio){
  // Indicador de velocidade visual
  const isPeri=velFator>1.5;
  ctx.font="bold 10px 'Share Tech Mono'";
  ctx.textAlign='center';
  if(noAfelio){
    const p=.6+Math.abs(Math.sin(ticks*.18))*.4;
    ctx.fillStyle=`rgba(0,229,255,${p})`;
    ctx.fillText('AFÉLIO 🐢',lx,ly-22);
  } else if(isPeri){
    ctx.fillStyle='rgba(255,100,50,.85)';
    ctx.fillText('PERIÉLIO ⚡',lx,ly-22);
  }
}

function drawHUD(){
  const nv=NIVEIS[nivelAtual];
  ctx.fillStyle='rgba(0,0,0,.75)';ctx.fillRect(0,0,W,60);
  ctx.strokeStyle='rgba(0,229,255,.15)';ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(0,60);ctx.lineTo(W,60);ctx.stroke();

  // Nível
  ctx.font="8px 'Press Start 2P'";ctx.fillStyle='#00e5ff';ctx.textAlign='left';
  ctx.fillText('NÍVEL '+nv.id+'/4',16,22);
  ctx.font="7px 'Share Tech Mono'";ctx.fillStyle='rgba(0,229,255,.5)';
  ctx.fillText(nv.titulo.split('—')[1]?.trim()||'',16,38);

  // Progresso planetas
  const total=nv.planetas.length;
  ctx.font="7px 'Press Start 2P'";ctx.fillStyle='#ffe566';ctx.textAlign='center';
  ctx.fillText('PLANETA '+(planetaAtual+1)+'/'+total,W/2,22);
  const bW=180,bX=W/2-bW/2;
  ctx.fillStyle='rgba(255,255,255,.07)';ctx.fillRect(bX,28,bW,9);
  ctx.fillStyle='#ffe566';ctx.fillRect(bX,28,bW*(Math.max(0,planetaAtual)/(total-1||1)),9);
  ctx.strokeStyle='rgba(255,229,100,.3)';ctx.lineWidth=1;ctx.strokeRect(bX,28,bW,9);

  // Vidas
  ctx.font="7px 'Press Start 2P'";ctx.fillStyle='#ff4081';ctx.textAlign='right';
  ctx.fillText('VIDAS:',W-80,22);
  for(let i=0;i<3;i++){
    ctx.fillStyle=i<vidas?'#ff4081':'rgba(100,50,70,.4)';
    ctx.beginPath();ctx.arc(W-52+i*22,18,8,0,Math.PI*2);ctx.fill();
  }

  // Instrução base
  const noAf=isAfelio();
  ctx.textAlign='center';
  if(noAf){
    const p=.5+Math.sin(ticks*.2)*.5;
    ctx.font="8px 'Press Start 2P'";ctx.fillStyle=`rgba(0,229,255,${p})`;
    ctx.fillText('✦  AFÉLIO! PRESSIONE ESPAÇO PARA SALTAR!  ✦',W/2,H-8);
  } else {
    ctx.font="6px 'Press Start 2P'";ctx.fillStyle='rgba(255,229,100,.4)';
    ctx.fillText('Aguarde a lua ficar AZUL (afélio) → ESPAÇO para saltar',W/2,H-8);
  }

  // Legenda lateral
  ctx.textAlign='right';ctx.font="7px 'Share Tech Mono'";
  ctx.fillStyle='rgba(255,100,50,.7)';ctx.fillText('⚡ PERIÉLIO = RÁPIDO',W-14,H-22);
  ctx.fillStyle='rgba(0,229,255,.7)';ctx.fillText('🐢 AFÉLIO = DEVAGAR = SALTAR!',W-14,H-10);
}

// ── LOOP ───────────────────────────────────────────────
showOvl('🪐 ÓRBITAS ELÍPTICAS',
  '2ª Lei de Kepler:\n\n⚡ <b style="color:#ff6644">PERIÉLIO</b> = perto do Sol = <b>RÁPIDO</b>\n🐢 <b style="color:#00e5ff">AFÉLIO</b> = longe do Sol = <b>DEVAGAR</b>\n\nVocê está numa lua. Pule para o próximo planeta\nquando a lua ficar <b style="color:#00e5ff">AZUL e piscar</b> (afélio)!\n\nESPAÇO = Saltar',
  [{label:'▶ NÍVEL 1', fn:()=>showTutorial(0)},
   {label:'SELECIONAR NÍVEL', cls:'b', fn:()=>showSelecao()}]
);

function loop(){
  ticks++;
  ctx.fillStyle='#04040e';ctx.fillRect(0,0,W,H);
  drawStars();

  if(gameState==='PLAYING'){
    const nv=NIVEIS[nivelAtual];
    const sol=nv.sol;

    // Nebulosa de fundo
    const nb=ctx.createRadialGradient(sol.x,sol.y,20,sol.x,sol.y,260);
    nb.addColorStop(0,'rgba(50,30,100,.14)');nb.addColorStop(1,'transparent');
    ctx.fillStyle=nb;ctx.fillRect(0,0,W,H);

    // Órbitas
    nv.planetas.forEach((p,i)=>{
      const ativo=i===planetaAtual;
      drawOrbita(p.x,p.y,nv.lua.rx,nv.lua.ry,
        ativo?'rgba(0,229,255,.35)':'rgba(100,140,200,.12)',
        ativo?1.5:.7);
    });

    // Sol
    drawSol(sol.x,sol.y,sol.r);

    // Planetas
    nv.planetas.forEach((p,i)=>{
      const isDestino=i>planetaAtual;
      const isCurrent=i===planetaAtual;
      const isDone=i<planetaAtual;
      ctx.save();if(isDone)ctx.globalAlpha=.35;
      drawPlaneta(p.x,p.y,p.r,p.cor,p.corL,p.sombra,p.ring,p.ringCor,isCurrent&&!isDone);
      ctx.restore();
      // Label planeta
      ctx.font="6px 'Press Start 2P'";
      ctx.fillStyle=isCurrent?p.cor:isDone?'rgba(100,120,100,.5)':'rgba(150,160,180,.55)';
      ctx.textAlign='center';
      ctx.fillText(p.nome||'',p.x,p.y+p.r+15);
    });

    // Atualizar lua — física da 2ª Lei de Kepler
    const velFator=getVelFator();
    luaAng+=nv.lua.vel*velFator;
    const lp=getLuaPos();
    const noAf=isAfelio();
    const curPlaneta=nv.planetas[Math.min(planetaAtual,nv.planetas.length-1)];
    drawLua(lp.x,lp.y,8,curPlaneta?curPlaneta.corL:'#aabbcc',noAf,true);
    drawVelIndicator(lp.x,lp.y,velFator,noAf);

    // Luas dos outros planetas (decorativas)
    nv.planetas.forEach((p,i)=>{
      if(i===planetaAtual) return;
      const la=ticks*(.025+(i*.005));
      const dlx=p.x+Math.cos(la)*nv.lua.rx*.85;
      const dly=p.y+Math.sin(la)*nv.lua.ry*.85;
      if(i<planetaAtual) return; // planetas já visitados sem lua
      drawLua(dlx,dly,5,'#8899aa',false,false);
    });

    // Partículas
    particulas.forEach(pp=>{pp.x+=pp.vx;pp.y+=pp.vy;pp.vy+=.06;pp.vida--;});
    particulas=particulas.filter(pp=>pp.vida>0);
    particulas.forEach(pp=>{
      ctx.save();ctx.globalAlpha=pp.vida/pp.maxVida;
      ctx.fillStyle=pp.cor;ctx.beginPath();ctx.arc(pp.x,pp.y,pp.r,0,Math.PI*2);ctx.fill();
      ctx.restore();
    });

    drawHUD();
  }
  requestAnimationFrame(loop);
}
loop();

// Controles
window.addEventListener('keydown',e=>{
  if(e.key===' '||e.key==='ArrowUp'){e.preventDefault();tentarSalto();}
});
GC.addEventListener('click',tentarSalto);
</script>
