<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"/>
<title>Gravitação Z</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;overflow:hidden}
body{
  background:#000;
  display:flex;align-items:center;justify-content:center;
  font-family:'Share Tech Mono',monospace;
  color:#c8d8e8;
}

/* ajustes mobile / safe-area */
@media (max-width: 880px), (pointer: coarse){
  html,body{height:100vh; height:100dvh;}
  .press-start-bar{ padding-bottom: env(safe-area-inset-bottom, 0px); }
  #screen-menu{ padding-top: env(safe-area-inset-top, 0px); padding-bottom: env(safe-area-inset-bottom, 0px); }
}

/* scanlines globais */
body::before{
  content:'';position:fixed;inset:0;
  background:repeating-linear-gradient(to bottom,transparent 0,transparent 2px,rgba(0,0,0,.10) 2px,rgba(0,0,0,.10) 4px);
  pointer-events:none;z-index:9999;
}

/* ══════════════════════════════════
   TELA 1 — CAPA
══════════════════════════════════ */
#screen-cover{
  position:fixed;inset:0;
  display:flex;align-items:center;justify-content:center;
  z-index:10;
  overflow:hidden;
  background:#000;
  transition:opacity .6s ease;
}
#screen-cover.hidden{opacity:0;pointer-events:none;}

/* fundo desfocado para preencher barras laterais */
.cover-bg-blur{
  position:absolute;inset:-20px;
  background-size:cover;
  background-position:center;
  filter:blur(22px) brightness(.35) saturate(.6);
  z-index:0;
}

/* imagem principal — 16:9, preenche tela toda */
.cover-img{
  position:absolute;
  inset:0;
  z-index:1;
  width:100%;
  height:100%;
  object-fit:cover;
  object-position:center center;
  display:block;
}

/* vinheta nas bordas */
.cover-vignette{
  position:absolute;inset:0;z-index:2;
  background:radial-gradient(ellipse at center, transparent 40%, rgba(0,0,0,.55) 100%);
  pointer-events:none;
}

/* barra "Press START" — posicionada em relação à imagem */
.press-start-bar{
  position:absolute;
  bottom:5%;left:0;right:0;
  z-index:3;
  display:flex;align-items:center;justify-content:center;
  pointer-events:none;
}
.press-start-text{
  font-family:'Press Start 2P',monospace;
  font-size:clamp(.8rem,2.2vw,1.35rem);
  color:#1a0800;
  letter-spacing:.18em;
  animation:psb 1.1s steps(1) infinite;
  /* botão amarelo estilo DB */
  background:linear-gradient(180deg,#ffe066 0%,#ffcc00 45%,#e6a800 100%);
  padding:.45em 1.8em .4em;
  border-radius:2px;
  border-top:3px solid #fff8cc;
  border-bottom:3px solid #996600;
  border-left:2px solid #cc9900;
  border-right:2px solid #cc9900;
  text-shadow:1px 1px 0 rgba(255,255,255,.4);
  box-shadow:0 4px 18px rgba(0,0,0,.6), 0 0 28px rgba(255,200,0,.25);
  user-select:none;
}
@keyframes psb{0%,49%{opacity:1}50%,100%{opacity:0}}

/* cursor de clique */
#screen-cover{cursor:pointer}

/* ══════════════════════════════════
   TELA 2 — MENU
══════════════════════════════════ */
#screen-menu{
  position:fixed;inset:0;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  z-index:9;
  opacity:0;pointer-events:none;
  transition:opacity .6s ease;
}
#screen-menu.visible{opacity:1;pointer-events:all;}

/* fundo estrelado do menu */
#bg-canvas{position:fixed;inset:0;z-index:0;}

.menu-content{
  position:relative;z-index:10;
  display:flex;flex-direction:column;
  align-items:center;
}

/* logo pequeno no menu */
.menu-logo-wrap{
  text-align:center;
  margin-bottom:1.8rem;
  animation:fadeUp .7s ease both;
}
.menu-logo-sub{font-size:.48rem;letter-spacing:.4em;color:#00e5ff;opacity:.65;margin-bottom:.5rem;}
.menu-logo{
  font-family:'Orbitron',sans-serif;font-weight:900;
  font-size:clamp(1.6rem,5vw,3rem);
  letter-spacing:.18em;
  color:#ffe566;
  text-shadow:0 0 14px #ffe566,0 0 32px #ff9900,0 0 60px rgba(255,153,0,.25);
  line-height:1;
}
.menu-logo-z{color:#00e5ff;text-shadow:0 0 14px #00e5ff,0 0 30px #0066ff;}

/* thumbnail da capa no menu */
.menu-cover-thumb{
  width:clamp(120px,18vw,200px);
  height:auto;
  border:2px solid #2a3a4a;
  box-shadow:0 0 20px rgba(0,100,200,.2);
  margin-bottom:1.6rem;
  animation:fadeUp .7s ease .08s both;
}

/* painel botões */
.panel{
  border:1px solid #1a2a3a;
  background:rgba(4,4,18,.92);
  padding:2rem 2.8rem;
  text-align:center;
  position:relative;
  min-width:300px;
  animation:fadeUp .7s ease .16s both;
}
.panel-corner{position:absolute;width:12px;height:12px;border-color:#ffe566;border-style:solid;opacity:.45;}
.panel-corner.tl{top:0;left:0;border-width:2px 0 0 2px}
.panel-corner.tr{top:0;right:0;border-width:2px 2px 0 0}
.panel-corner.bl{bottom:0;left:0;border-width:0 0 2px 2px}
.panel-corner.br{bottom:0;right:0;border-width:0 2px 2px 0}

.btn{
  display:block;width:100%;
  font-family:'Press Start 2P',monospace;font-size:.58rem;
  background:transparent;border:2px solid;
  padding:12px 22px;cursor:pointer;
  letter-spacing:.1em;text-decoration:none;text-align:center;
  transition:background .15s,box-shadow .15s,transform .1s;
  margin-bottom:.75rem;
}
.btn:last-child{margin-bottom:0}
.btn-primary{border-color:#ffe566;color:#ffe566;}
.btn-primary:hover{background:rgba(255,229,100,.1);box-shadow:0 0 18px rgba(255,229,100,.32);transform:translateY(-1px);}
.btn-secondary{border-color:#00e5ff;color:#00e5ff;}
.btn-secondary:hover{background:rgba(0,229,255,.07);box-shadow:0 0 14px rgba(0,229,255,.28);transform:translateY(-1px);}
.btn-disabled{border-color:#1e2e3e;color:#1e2e3e;cursor:not-allowed;}

.save-badge{
  margin-top:1rem;font-size:.47rem;letter-spacing:.1em;color:#1e3a2a;
}
.save-badge.active{color:#44eebb;}
.save-dot{display:inline-block;width:6px;height:6px;border-radius:50%;background:#44eebb;margin-right:5px;vertical-align:middle;animation:savePulse 2s ease-in-out infinite;}
@keyframes savePulse{0%,100%{opacity:.3}50%{opacity:1}}

@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}

.version{position:fixed;bottom:10px;right:14px;font-size:.42rem;letter-spacing:.1em;color:#0e1e2e;z-index:20;}

/* ══════════════════════════════════
   TELA 3 — CUTSCENE
══════════════════════════════════ */
#screen-cutscene{
  position:fixed;inset:0;
  background:#000;
  display:flex;align-items:center;justify-content:center;
  z-index:20;
  opacity:0;pointer-events:none;
  transition:opacity .5s ease;
}
#screen-cutscene.visible{opacity:1;pointer-events:all;}
#screen-cutscene.hidden{opacity:0;pointer-events:none;}

#cutscene-video{
  width:100%;height:100%;
  object-fit:contain;
  background:#000;
  display:block;
}

/* botão pular */
#skip-btn{
  position:absolute;
  bottom:22px;right:24px;
  font-family:'Press Start 2P',monospace;
  font-size:.5rem;letter-spacing:.12em;
  color:rgba(255,255,255,.45);
  background:rgba(0,0,0,.4);
  border:1px solid rgba(255,255,255,.18);
  padding:7px 14px;
  cursor:pointer;
  transition:.2s;
  z-index:5;
}
#skip-btn:hover{color:#ffe566;border-color:#ffe566;}

/* fade-in do texto no início */
#cutscene-label{
  position:absolute;
  top:18px;left:50%;transform:translateX(-50%);
  font-family:'Press Start 2P',monospace;
  font-size:.45rem;letter-spacing:.2em;
  color:rgba(255,229,100,.35);
  pointer-events:none;
}

</style>
</head>
<body>

<!-- ── TELA CUTSCENE ── -->
<div id="screen-cutscene">
  <span id="cutscene-label">NOVA JORNADA</span>
  <video id="cutscene-video" src="entrada.mp4" playsinline preload="auto"></video>
  <button id="skip-btn">PULAR  ▶▶</button>
</div>

<!-- ── TELA 1: CAPA ── -->
<div id="screen-cover">
  <div class="cover-bg-blur" id="cover-bg-blur"></div>
  <img class="cover-img" id="cover-img" src="" alt="Gravitação Z"/>
  <div class="cover-vignette"></div>
  <div class="press-start-bar">
    <span class="press-start-text">Press START button</span>
  </div>
</div>

<!-- ── TELA 2: MENU ── -->
<canvas id="bg-canvas"></canvas>
<div id="screen-menu">
  <div class="menu-content">
    <div class="menu-logo-wrap">
      <div class="menu-logo-sub">◈ JOGO EDUCATIVO DE FÍSICA ◈</div>
      <div class="menu-logo">GRAVITAÇÃO <span class="menu-logo-z">Z</span></div>
    </div>

    <img class="menu-cover-thumb" id="thumb-img" src="" alt=""/>

    <div class="panel">
      <div class="panel-corner tl"></div><div class="panel-corner tr"></div>
      <div class="panel-corner bl"></div><div class="panel-corner br"></div>

      <button class="btn btn-primary" id="btn-novo">▶ NOVA JORNADA</button>
      <a class="btn btn-secondary" href="mapa_mobile.html" id="btn-continuar" onclick="GZ_Audio.btnClick()">↩ CONTINUAR</a>
      <button class="btn btn-disabled" disabled>⚙ CONFIGURAÇÕES</button>

      <div class="save-badge" id="save-badge">SEM SAVE ENCONTRADO</div>
    </div>
  </div>
</div>

<div class="version">GRAVITAÇÃO Z · BUILD 0.1</div>

<script src="audio.js"></script>

const COVER_SRC = 'data:image/png;base64,' + COVER_B64;
document.getElementById('cover-img').src = COVER_SRC;
document.getElementById('thumb-img').src  = COVER_SRC;
document.getElementById('cover-bg-blur').style.backgroundImage = 'url(' + COVER_SRC + ')';

// ── ELEMENTOS ─────────────────────────────────────────
const screenCutscene = document.getElementById('screen-cutscene');
const screenCover    = document.getElementById('screen-cover');
const screenMenu     = document.getElementById('screen-menu');
const video          = document.getElementById('cutscene-video');
const skipBtn        = document.getElementById('skip-btn');

// destino após cutscene: 'menu' ou 'mapa'
let cutsceneDestino = 'menu';

// ── APÓS CUTSCENE ─────────────────────────────────────
function afterCutscene(){
  screenCutscene.classList.remove('visible');
  screenCutscene.classList.add('hidden');
  video.pause();
  setTimeout(()=>{
    screenCutscene.style.display='none';
    if(cutsceneDestino === 'mapa'){
      window.location.href = 'mapa_mobile.html';
    } else {
      screenCover.style.display='none';
      screenMenu.classList.add('visible');
      startBgLoop();
    }
  }, 550);
}

// ── IR AO MENU (sem cutscene) ─────────────────────────
function goToMenu(){
  screenCover.classList.add('hidden');
  video.pause();
  setTimeout(()=>{
    screenCover.style.display='none';
    screenMenu.classList.add('visible');
    startBgLoop();
  }, 550);
}

// ── CUTSCENE DA CAPA (nova jornada via capa) ──────────
function playCutsceneFromCover(){
  screenCover.classList.add('hidden');
  cutsceneDestino = 'mapa';
  setTimeout(()=>{
    screenCover.style.display='none';
    screenCutscene.classList.add('visible');
    video.currentTime=0;
    video.play().catch(()=>{ afterCutscene(); });
  }, 500);
}

// ── CUTSCENE DO MENU (botão Nova Jornada) ─────────────
function playNewGameCutscene(){
  screenMenu.classList.remove('visible');
  cutsceneDestino = 'mapa';
  setTimeout(()=>{
    screenCutscene.classList.add('visible');
    video.currentTime=0;
    video.play().catch(()=>{ afterCutscene(); });
  }, 400);
}

// ao terminar o vídeo
video.addEventListener('ended', afterCutscene);

// botão pular
skipBtn.addEventListener('click', afterCutscene);

// ── CLIQUE NA CAPA ────────────────────────────────────
function handleCoverClick(){
  GZ_Audio.btnStart();
  if(screenCover.classList.contains('hidden')) return;
  goToMenu();
}

screenCover.addEventListener('click', handleCoverClick);
window.addEventListener('keydown', e=>{
  if(screenCutscene.classList.contains('visible')){

// ── FUNDO ANIMADO DO MENU ─────────────────────────────
const bgC = document.getElementById('bg-canvas');
const bgX = bgC.getContext('2d');
let W, H, bgStarted=false;
const STARS=[];
const meteors=[];

function resizeBg(){
  W=bgC.width=window.innerWidth;
  H=bgC.height=window.innerHeight;
}
resizeBg();
window.addEventListener('resize',resizeBg);

function initStars(){
  STARS.length=0;
  for(let i=0;i<300;i++) STARS.push({
    x:Math.random()*W,y:Math.random()*H,
    r:Math.random()*1.7+.2,
    t:Math.random()*Math.PI*2,
    s:Math.random()*.022+.005
  });
}

function spawnMeteor(){
  if(Math.random()<.004) meteors.push({x:Math.random()*W,y:-10,vx:1.5+Math.random()*1.5,vy:2.5+Math.random()*2,len:40+Math.random()*50,life:1});
}

let tick=0;
function bgLoop(){
  tick++;
  bgX.fillStyle='#04040e';bgX.fillRect(0,0,W,H);
  [{x:W*.2,y:H*.2,r:W*.22,c:'rgba(80,40,180,.07)'},{x:W*.75,y:H*.6,r:W*.2,c:'rgba(20,100,200,.06)'},{x:W*.5,y:H*.8,r:W*.16,c:'rgba(180,30,100,.05)'}].forEach(n=>{
    const g=bgX.createRadialGradient(n.x,n.y,0,n.x,n.y,n.r);
    g.addColorStop(0,n.c);g.addColorStop(1,'transparent');
    bgX.fillStyle=g;bgX.fillRect(0,0,W,H);
  });
  STARS.forEach(s=>{s.t+=s.s;const a=.18+Math.sin(s.t)*.22;bgX.fillStyle=`rgba(200,218,255,${a})`;bgX.beginPath();bgX.arc(s.x,s.y,s.r,0,Math.PI*2);bgX.fill();});
  spawnMeteor();
  for(let i=meteors.length-1;i>=0;i--){
    const m=meteors[i];
    bgX.save();bgX.globalAlpha=m.life*.5;bgX.strokeStyle='rgba(180,220,255,.8)';bgX.lineWidth=1.4;
    bgX.beginPath();bgX.moveTo(m.x,m.y);bgX.lineTo(m.x-m.vx/m.vy*m.len,m.y-m.len);bgX.stroke();
    bgX.restore();
    m.x+=m.vx;m.y+=m.vy;m.life-=.02;
    if(m.life<=0||m.y>H) meteors.splice(i,1);
  }
  requestAnimationFrame(bgLoop);
}

function startBgLoop(){
  if(bgStarted) return;
  bgStarted=true;
  initStars();
  bgLoop();
}

// ── ESTADO DO SAVE ────────────────────────────────────
const prog=carregarProgresso();
const badge=document.getElementById('save-badge');
const btnCont=document.getElementById('btn-continuar');

if(prog.missao2_unlocked||prog.missao3_unlocked||prog.tem_luneta){
  badge.innerHTML='<span class="save-dot"></span>SAVE ENCONTRADO · MISSÃO '+(prog.missao3_unlocked?3:prog.missao2_unlocked?2:1)+' DISPONÍVEL';
  badge.classList.add('active');
} else {
  btnCont.classList.remove('btn-secondary');
  btnCont.classList.add('btn-disabled');
  btnCont.removeAttribute('href');
  btnCont.style.pointerEvents='none';
}

// Sons de hover nos botões
document.querySelectorAll('.btn').forEach(b => {
  b.addEventListener('mouseenter', () => GZ_Audio.btnHover());
});

document.getElementById('btn-novo').addEventListener('click',()=>{

  // Reset do progresso
  salvarProgresso({missao1_unlocked:true,missao2_unlocked:false,missao3_unlocked:false,tem_luneta:false});
  // Toca cutscene e depois vai ao mapa
  playNewGameCutscene();
});
</script>
<script id="gz-mobile-cutscene-fix">
(function(){
  document.addEventListener('DOMContentLoaded', function(){
    const screenCutscene = document.getElementById('screen-cutscene');
    const video = document.getElementById('cutscene-video');
    if(!screenCutscene || !video) return;

    function cutsceneVisivel(){
      return screenCutscene.classList.contains('visible');
    }

    // No primeiro toque, tenta retomar o play (autoplay bloqueado no mobile)
    function retomarPlay(){
      if(cutsceneVisivel() && video.paused){
        video.play().catch(()=>{});
      }
    }

    // Toque em qualquer lugar da cutscene = pular (dispara 'ended')
    function tapSkip(e){
      if(cutsceneVisivel()){
        e.preventDefault();
        video.dispatchEvent(new Event('ended'));
      }
    }

    document.addEventListener('touchstart', function(e){
      retomarPlay();
      tapSkip(e);
    }, {passive:false});
  });
})();
</script>

<script id="gz-fs-script">
(function(){
  const fsBtn = document.getElementById('gz-fullscreen-btn');
  if(!fsBtn) return;
  fsBtn.addEventListener('click', function(){
    const el = document.documentElement;
    if(!document.fullscreenElement){
      (el.requestFullscreen && el.requestFullscreen())
        || (el.webkitRequestFullscreen && el.webkitRequestFullscreen());
    } else {
      (document.exitFullscreen && document.exitFullscreen())
        || (document.webkitExitFullscreen && document.webkitExitFullscreen());
    }
  });
})();
</script>
