<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Gravitação Z — Missão 1: A Grande Disputa</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{
  background:#04040e;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  min-height:100vh;
  font-family:'Share Tech Mono',monospace;
  color:#c8d8e8;overflow:hidden;
}
body::before{
  content:'';position:fixed;inset:0;
  background:repeating-linear-gradient(to bottom,transparent 0,transparent 2px,rgba(0,0,0,.08) 2px,rgba(0,0,0,.08) 4px);
  pointer-events:none;z-index:999;
}
header{display:flex;align-items:center;gap:1rem;margin-bottom:.5rem}
header h1{
  font-family:'Orbitron',sans-serif;font-weight:900;font-size:1.35rem;
  letter-spacing:.3em;text-transform:uppercase;
  color:#ffe566;text-shadow:0 0 10px #ffe566,0 0 22px #ff9900;
}
.badge{font-size:.55rem;letter-spacing:.15em;padding:2px 8px;border:1px solid #44eebb;color:#44eebb}
.canvas-wrapper{position:relative;border:2px solid #1e2a3a;box-shadow:0 0 50px rgba(100,60,220,.18)}
canvas{display:block}
.hint{margin-top:8px;font-size:.6rem;color:#4a5a6a;letter-spacing:.1em}
.back-btn{
  position:fixed;top:12px;left:14px;
  font-family:'Press Start 2P',monospace;font-size:.5rem;
  color:#2a4a6a;text-decoration:none;letter-spacing:.1em;
  border:1px solid #1a2a3a;padding:5px 10px;
  z-index:50;transition:.2s;
}
.back-btn:hover{color:#00e5ff;border-color:#00e5ff}

/* ── CAIXA DE DIÁLOGO RPG ── */
#dialogue-overlay{
  display:none;position:absolute;
  bottom:0;left:0;right:0;height:148px;
  z-index:25;animation:dlgIn .18s ease;
}
@keyframes dlgIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
#dialogue-overlay.visible{display:block}
.dlg-frame{position:absolute;inset:0;background:#1a1208;border-top:4px solid #1a1208;}
.dlg-inner{
  position:absolute;inset:5px;
  background:linear-gradient(180deg,#e8d08a 0%,#c8a840 4px,#f5e6b0 4px,#f0dea0 100%);
  border:3px solid #8b6914;
  box-shadow:inset 0 0 0 2px #f5e8b8,inset 0 0 0 4px #a07820;
  display:flex;align-items:stretch;
}
.dlg-inner::before,.dlg-inner::after{content:'◆';position:absolute;font-size:14px;color:#8b6914;line-height:1;top:4px;}
.dlg-inner::before{left:6px}.dlg-inner::after{right:6px}
.dlg-avatar-wrap{width:110px;flex-shrink:0;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;padding:6px 8px 0;}
#avatar-canvas{width:90px;height:90px;image-rendering:pixelated;border:3px solid #8b6914;background:#0a0814;box-shadow:inset 0 0 8px rgba(0,0,0,.6),0 0 0 2px #c8a840;}
.dlg-avatar-name{font-family:'Press Start 2P',monospace;font-size:5.5px;color:#3a2200;margin-top:4px;text-align:center;max-width:90px;word-break:break-all;}
.dlg-sep{width:4px;background:repeating-linear-gradient(180deg,#8b6914 0,#8b6914 4px,#c8a840 4px,#c8a840 8px);margin:8px 0;flex-shrink:0;}
.dlg-text-area{flex:1;display:flex;flex-direction:column;justify-content:center;padding:10px 16px 10px 12px;position:relative;}
.dlg-speaker-bar{display:inline-block;background:#1a0c00;border:2px solid #8b6914;box-shadow:2px 2px 0 #3a2200;padding:3px 12px 3px 8px;margin-bottom:8px;align-self:flex-start;}
.dlg-speaker-name{font-family:'Press Start 2P',monospace;font-size:8px;color:#ffe566;text-shadow:1px 1px 0 #884400,0 0 8px rgba(255,180,0,.5);letter-spacing:.12em;}
#speaker-message{font-family:'Press Start 2P',monospace;font-size:7.5px;line-height:1.85;color:#1a0c00;text-shadow:.5px .5px 0 rgba(255,255,255,.3);}
.dlg-arrow{position:absolute;bottom:8px;right:14px;font-size:12px;color:#8b4500;animation:arrowBlink 1s steps(1) infinite;}
@keyframes arrowBlink{50%{opacity:0}}
.dlg-avatar-right{width:110px;flex-shrink:0;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;padding:6px 8px 0;}
#avatar-canvas-r{width:90px;height:90px;image-rendering:pixelated;border:3px solid #8b6914;background:#0a0814;box-shadow:inset 0 0 8px rgba(0,0,0,.6),0 0 0 2px #c8a840;}
.dlg-avatar-name-r{font-family:'Press Start 2P',monospace;font-size:5.5px;color:#3a2200;margin-top:4px;text-align:center;max-width:90px;word-break:break-all;}

/* ── BANNER VITÓRIA ── */
#victory-banner{
  position:absolute;inset:0;background:rgba(0,0,0,.85);
  display:none;align-items:center;justify-content:center;
  flex-direction:column;z-index:40;
}
#victory-banner.visible{display:flex;animation:fadeIn .4s ease}
#cutscene-aliados.visible{display:block!important;animation:fadeIn .3s ease}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.victory-inner{
  border:3px solid #ffe566;background:rgba(8,8,22,.98);
  padding:30px 44px;text-align:center;
  box-shadow:0 0 40px rgba(255,229,100,.25),inset 0 0 30px rgba(0,0,0,.5);
}
.victory-title{
  font-family:'Orbitron',sans-serif;font-size:1.15rem;
  color:#ffe566;text-shadow:0 0 20px #ff9900;
  letter-spacing:.25em;margin-bottom:14px;
}
.victory-item{font-size:.72rem;color:#00e5ff;line-height:1.75;margin-bottom:20px}
.victory-btn{
  font-family:'Press Start 2P',monospace;font-size:.6rem;
  background:transparent;border:2px solid #ffe566;
  color:#ffe566;padding:10px 22px;cursor:pointer;letter-spacing:.15em;transition:.2s;
}
.victory-btn:hover{background:rgba(255,229,100,.12);box-shadow:0 0 12px rgba(255,229,100,.4)}

/* ── BANNER DERROTA ── */
#defeat-banner{
  position:absolute;inset:0;background:rgba(0,0,0,.9);
  display:none;align-items:center;justify-content:center;
  flex-direction:column;z-index:40;
}
#defeat-banner.visible{display:flex;animation:fadeIn .4s ease}
.defeat-inner{
  border:3px solid #ff4081;background:rgba(8,4,18,.98);
  padding:30px 44px;text-align:center;
  box-shadow:0 0 40px rgba(255,64,129,.2),inset 0 0 30px rgba(0,0,0,.5);
}
.defeat-title{
  font-family:'Orbitron',sans-serif;font-size:1.1rem;
  color:#ff4081;text-shadow:0 0 18px #ff0055;
  letter-spacing:.2em;margin-bottom:14px;
}
.defeat-item{font-size:.65rem;color:#c8d8e8;line-height:1.75;margin-bottom:20px}
.defeat-btn{
  font-family:'Press Start 2P',monospace;font-size:.6rem;
  background:transparent;border:2px solid #ff4081;
  color:#ff4081;padding:10px 22px;cursor:pointer;letter-spacing:.15em;transition:.2s;
  margin:0 6px;
}
.defeat-btn:hover{background:rgba(255,64,129,.1);box-shadow:0 0 10px rgba(255,64,129,.35)}
</style>
</head>

<!-- Diálogo RPG -->
  <div id="dialogue-overlay">

        </div>
      </div>

  <!-- Banner Vitória -->
  <div id="victory-banner">

      <div class="victory-item" id="victory-text"></div>

</div>

const canvas = document.getElementById('gameCanvas');
const ctx    = canvas.getContext('2d');
const W = canvas.width, H = canvas.height;

let estadoJogo = "FASE_1_LUTA";
let estadoAnteriorDialogo = "FASE_1_LUTA";

let progresso = carregarProgresso();

// ── DIÁLOGO ────────────────────────────────────────────
let scriptAtual=[],indiceScript=0,acaoPos=null,dlgOuvinte=null;
let dlgCooldown=0; // frames de espera antes de poder avançar

function atualizarDlg(){
  const ov=document.getElementById('dialogue-overlay');
  if(indiceScript<scriptAtual.length){
    const f=scriptAtual[indiceScript];
    ov.classList.add('visible');
    document.getElementById('speaker-name').textContent=f.quem;
    document.getElementById('speaker-message').textContent=f.texto;
    dlgCooldown=55; // esperar ~1s antes de poder avançar
    desenharAvatarCanvas(document.getElementById('avatar-canvas'),f.quem);
    document.getElementById('avatar-name-l').textContent=f.quem;
    const ouvinte=f.ouvinte||dlgOuvinte;
    if(ouvinte){
      desenharAvatarCanvas(document.getElementById('avatar-canvas-r'),ouvinte);
      document.getElementById('avatar-name-r').textContent=ouvinte;
    } else {
      document.getElementById('avatar-canvas-r').getContext('2d').clearRect(0,0,90,90);
      document.getElementById('avatar-name-r').textContent='';
    }
  } else {
    ov.classList.remove('visible');
    estadoJogo=estadoAnteriorDialogo;
    const cb=acaoPos; acaoPos=null;
    if(cb) cb();
  }
}

function dispararHistoria(falas,callback,ouvinte){
  scriptAtual=falas; indiceScript=0; acaoPos=callback; dlgOuvinte=ouvinte||null;
  if(estadoJogo!=="DIALOGO") estadoAnteriorDialogo=estadoJogo;
  estadoJogo="DIALOGO";
  dlgCooldown=80;
  atualizarDlg();
}

let luta={}, particulas=[], flashTela=0;
const RANGE_SOCO=90, RANGE_ATAQUE=110, VEL_INIMIGO=1.6;

function inicializarLuta(){
  luta={
    playerX:160, playerY:482, playerHp:100, playerMaxHp:100,
    playerAtacando:false, timerAtaque:0, playerRecebendo:0,
    arX:520, arY:482, arHp:100, arMaxHp:100,
    arAtacando:false, arTimer:0, arRecebendo:0,
    ptVisible:false, ptX:610, ptY:482, ptHp:100, ptMaxHp:100,
    ptAtacando:false, ptTimer:0, ptRecebendo:0,
    aliadosVisible:false, ariscX:-90, copX:-150, galX:-210, cutsceneIniciada:false,
    fase:1, travado:false, golpeAnim:0,
    msg:'ESPAÇO: Socar  ·  ← →: Mover',
  };
  particulas=[]; flashTela=0;
  document.getElementById('hint-bar').textContent='ESPAÇO: Socar · SETAS ← →: Mover · Derrote Aristóteles!';
  document.getElementById('defeat-banner').classList.remove('visible');
  document.getElementById('victory-banner').classList.remove('visible');
  estadoJogo="FASE_1_LUTA";
  estadoAnteriorDialogo="FASE_1_LUTA";
}

function executarSoco(){
  if(luta.travado||luta.playerAtacando||luta.fase>3) return;
  luta.playerAtacando=true; luta.timerAtaque=16;
  const dx1=Math.abs(luta.playerX-luta.arX);
  const dx2=luta.ptVisible?Math.abs(luta.playerX-luta.ptX):9999;
  if(dx1<RANGE_SOCO&&luta.arHp>0){
    luta.arHp=Math.max(0,luta.arHp-(8+Math.floor(Math.random()*6)));
    luta.arRecebendo=14; boom(luta.arX,luta.arY-30,'#ffe566',7); flashTela=4; GZ_Audio.danoCausado();
  }
  if(dx2<RANGE_SOCO&&luta.ptVisible&&luta.ptHp>0){
    luta.ptHp=Math.max(0,luta.ptHp-(8+Math.floor(Math.random()*6)));
    luta.ptRecebendo=14; boom(luta.ptX,luta.ptY-30,'#cc88ff',7); flashTela=4; GZ_Audio.danoCausado();
  }
}

function moverInimigo(ix,vel){
  const dx=luta.playerX-ix;
  if(Math.abs(dx)>RANGE_ATAQUE+8) ix+=dx>0?vel:-vel;
  return ix;
}

function boom(x,y,cor,n){
  for(let i=0;i<n;i++)
    particulas.push({x,y,vx:(Math.random()-.5)*6,vy:(Math.random()-.5)*6-2,vida:25+Math.random()*15,maxVida:40,cor,r:Math.random()*4+2});
}

function processarLuta(t){
  const emContextoLuta=estadoJogo==="FASE_1_LUTA"||(estadoJogo==="DIALOGO"&&estadoAnteriorDialogo==="FASE_1_LUTA")||estadoJogo==="FASE_1_VITORIA";
  if(!emContextoLuta) return;
  const lutaAtiva=estadoJogo==="FASE_1_LUTA";

  if(!luta.travado&&lutaAtiva){
    if(keys['ArrowLeft']&&luta.playerX>40)  luta.playerX-=4;
    if(keys['ArrowRight']&&luta.playerX<W-40) luta.playerX+=4;
  }
  if(luta.playerAtacando){luta.timerAtaque--;if(luta.timerAtaque<=0)luta.playerAtacando=false;}
  if(luta.arRecebendo>0)luta.arRecebendo--;
  if(luta.ptRecebendo>0)luta.ptRecebendo--;
  if(luta.playerRecebendo>0)luta.playerRecebendo--;

  if(lutaAtiva&&!luta.travado){
    if(luta.fase===1||luta.fase===3){
      if(luta.arHp>0) luta.arX=moverInimigo(luta.arX,VEL_INIMIGO);
    }
    if(luta.fase===3&&luta.ptVisible&&luta.ptHp>0){
      const dxPt=luta.playerX-luta.ptX;
      if(Math.abs(dxPt)>RANGE_ATAQUE+20) luta.ptX+=dxPt>0?VEL_INIMIGO:-VEL_INIMIGO;
    }
  }

  // ── FASE 1: Aristóteles solo ──
  if(luta.fase===1&&lutaAtiva){
    if(Math.random()<.025&&!luta.arAtacando){
      luta.arAtacando=true; luta.arTimer=18;
      if(Math.abs(luta.playerX-luta.arX)<RANGE_ATAQUE){
        luta.playerHp=Math.max(0,luta.playerHp-6);
        luta.playerRecebendo=12; boom(luta.playerX,luta.playerY-30,'#ff4081',4); GZ_Audio.socoNormal();
      }
    }
    if(luta.arAtacando){luta.arTimer--;if(luta.arTimer<=0)luta.arAtacando=false;}

    // derrota do jogador
    if(luta.playerHp<=0&&!luta.travado){
      luta.travado=true;
      setTimeout(mostrarDerrota, 400);
    }

    if(luta.arHp<=50&&!luta.travado){
      luta.travado=true; luta.fase=2;
      setTimeout(()=>{
        dispararHistoria([
          {quem:"ARISTÓTELES",ouvinte:"PTOLOMEU",texto:"Urgh... Você é forte, herético. Mas não é páreo para dois séculos de ciência dominante!"},
          {quem:"PTOLOMEU",ouvinte:"ARISTÓTELES",texto:"Meu mestre! Chego eu, Ptolomeu! Construí os Epiciclos e Deferentes para defender o Geocentrismo. Juntos, venceremos!"},
          {quem:"NARRADOR",ouvinte:"JOGADOR",texto:"Ptolomeu entra na arena! Os dois se unem e atacam juntos. O jogador recua..."},
        ],()=>{
          luta.ptVisible=true; luta.fase=3; luta.travado=false;
          luta.arHp=100; luta.ptHp=100;
          document.getElementById('hint-bar').textContent='ATENÇÃO: Dois inimigos! Desvie e contra-ataque!';
        },"JOGADOR");
      },200);
    }
  }

  // ── FASE 3: dupla ──
  if(luta.fase===3&&lutaAtiva){
    if(Math.random()<.04&&!luta.arAtacando){
      luta.arAtacando=true; luta.arTimer=16;
      if(Math.abs(luta.playerX-luta.arX)<RANGE_ATAQUE){
        luta.playerHp=Math.max(0,luta.playerHp-8);
        luta.playerRecebendo=15; boom(luta.playerX,luta.playerY-30,'#ff4081',5); GZ_Audio.socoNormal();
      }
    }
    if(Math.random()<.035&&luta.ptVisible&&!luta.ptAtacando){
      luta.ptAtacando=true; luta.ptTimer=14;
      if(Math.abs(luta.playerX-luta.ptX)<RANGE_ATAQUE){
        luta.playerHp=Math.max(0,luta.playerHp-7);
        luta.playerRecebendo=15; boom(luta.playerX,luta.playerY-30,'#aa44ff',5); GZ_Audio.socoNormal();
      }
    }
    if(luta.arAtacando){luta.arTimer--;if(luta.arTimer<=0)luta.arAtacando=false;}
    if(luta.ptAtacando){luta.ptTimer--;if(luta.ptTimer<=0)luta.ptAtacando=false;}

    // derrota do jogador
    if(luta.playerHp<=0&&!luta.travado){
      luta.travado=true;
      setTimeout(mostrarDerrota, 400);
    }

    if(luta.playerHp<=18&&!luta.travado){
      luta.travado=true; luta.fase=4; luta.playerHp=18;
      setTimeout(()=>{
        dispararHistoria([
          {quem:"NARRADOR",ouvinte:"JOGADOR",texto:"Você está caindo... A força dos dogmas medievais é esmagadora. Mas uma luz brilha no horizonte cósmico!"},
          {quem:"ARISTARCO DE SAMOS",ouvinte:"ARISTÓTELES",texto:"Não recue! Eu, Aristarco de Samos, propus 300 a.C. que a Terra orbita o Sol. A semente sempre existiu!"},
          {quem:"NICOLAU COPÉRNICO",ouvinte:"ARISTÓTELES",texto:"E eu, Copérnico, publiquei as bases matemáticas em 1543. O Sol é o centro — há equações para provar!"},
          {quem:"GALILEU GALILEI",ouvinte:"PTOLOMEU",texto:"E eu apontei minha LUNETA ao céu e vi as luas de Júpiter! Nem tudo orbita a Terra. A observação destrói o dogma!"},
          {quem:"GALILEU GALILEI",ouvinte:"ARISTÓTELES",texto:"Unidos pela ciência — Aristarco, Copérnico e eu — vamos libertar este viajante do obscurantismo!"},
          {quem:"NARRADOR",ouvinte:"ARISTÓTELES",texto:"Os três heliocentritas concentram toda a energia da razão científica... e desencadeiam um golpe definitivo!"},
        ],()=>{ luta.fase=5; luta.aliadosVisible=true; luta.golpeAnim=120; },"ARISTÓTELES");
      },200);
    }
  }

  // ── FASE 5: cutscene dos aliados ──
  if(luta.fase===5&&!luta.cutsceneIniciada){
    luta.cutsceneIniciada=true;
    luta.travado=true;
    luta.aliadosVisible=false; // esconder aliados pixel art durante a cutscene
    const cvDiv=document.getElementById('cutscene-aliados');
    const cvVid=document.getElementById('video-aliados');
    cvDiv.style.display='block';
    GZ_Audio&&GZ_Audio.socoForte();
    cvVid.currentTime=0;
    cvVid.play().catch(()=>{ terminarCutsceneAliados(); });
    cvVid.onended=()=>{ terminarCutsceneAliados(); };
  }

  particulas.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=.15;p.vida--;});
  particulas=particulas.filter(p=>p.vida>0);
  if(flashTela>0) flashTela--;
}

function r2(x,y,w,h,c){ctx.fillStyle=c;ctx.fillRect(x,y,w,h);}

function desenharJogadorLuta(x,y,atacando,recebendo,t){
  const movendo = keys['ArrowLeft'] || keys['ArrowRight'];

  // Prioridade: soco > guard > andar > idle
  let sprKey;
  if(atacando)         sprKey = 'soco';
  else if(recebendo>8) sprKey = 'guard';
  else if(movendo)     sprKey = (Math.floor(t/10)%2===0) ? 'walk1' : 'walk2';
  else                 sprKey = (Math.floor(t/22)%2===0) ? 'walk1' : 'walk2';

  const spr = _PS[sprKey];
  const sw=70, sh2=124; // tamanho de exibição no canvas
  const bob = movendo ? 0 : Math.sin(t*.05)*.5;
  const shake = recebendo>0 ? (Math.random()-.5)*3 : 0;
  const ox = x+shake;
  const oy = y+bob;

  // Sombra
  ctx.fillStyle='rgba(0,0,0,.28)';
  ctx.beginPath();ctx.ellipse(ox, oy+3, 18, 4, 0, 0, Math.PI*2);ctx.fill();

  ctx.save();
  // walk/guard orientados para ESQUERDA — espelhar quando inimigo à DIREITA
  // soco já orientado para DIREITA — espelhar quando inimigo à ESQUERDA
  const inimigoADireita = luta.arX > luta.playerX;
  const deveEspelhar = sprKey === 'soco' ? !inimigoADireita : inimigoADireita;
  if(deveEspelhar){
    ctx.translate(ox, 0);
    ctx.scale(-1, 1);
    ctx.translate(-ox, 0);
  }

  if(spr && spr.complete && spr.naturalWidth>0){
    ctx.imageSmoothingEnabled=true;
    ctx.imageSmoothingQuality='high';
    ctx.drawImage(spr, ox-sw/2, oy-sh2, sw, sh2);
  }
  ctx.restore();

  // Flash de dano
  if(recebendo>0){
    ctx.save();
    ctx.globalAlpha=(recebendo/16)*.4;
    ctx.fillStyle='#ff2222';
    ctx.fillRect(ox-sw/2, oy-sh2, sw, sh2);
    ctx.restore();
  }
}

function desenharAristotelesLuta(x,y,atacando,recebendo,morto,t){
  if(morto) return;
  const bob  = Math.sin(t*.05+1)*.6;
  const shake= recebendo>0?(Math.random()-.5)*3:0;
  const ox=x+shake, oy=y+bob;
  const sw=70, sh2=124;

  // Escolher sprite
  // Detectar se Aristóteles está se movendo
  const arMovendo = Math.abs(luta.arX - (luta._arXprev||luta.arX)) > 0.5;
  luta._arXprev = luta.arX;
  let sprKey;
  if(atacando)       sprKey = 'soco';
  else if(arMovendo) sprKey = (Math.floor(t/10)%2===0) ? 'walk1' : 'walk2';
  else               sprKey = (Math.floor(t/24)%2===0) ? 'stand' : 'walk1';
  const spr = _AR[sprKey];

  // Sombra
  ctx.fillStyle='rgba(0,0,0,.28)';
  ctx.beginPath();ctx.ellipse(ox,oy+3,18,4,0,0,Math.PI*2);ctx.fill();

  ctx.save();
  ctx.globalAlpha = recebendo>0 ? .55 : 1;

  // walk/stand orientados para ESQUERDA — espelhar se jogador à DIREITA
  // soco já orientado para ESQUERDA — espelhar se jogador à ESQUERDA (inverso)
  const jogadorADireita = luta.playerX > luta.arX;
  const arDeveEspelhar = !jogadorADireita; // todos os sprites olham para esquerda
  if(arDeveEspelhar){
    ctx.translate(ox,0); ctx.scale(-1,1); ctx.translate(-ox,0);
  }

  if(spr && spr.complete && spr.naturalWidth>0){
    ctx.imageSmoothingEnabled=true;
    ctx.imageSmoothingQuality='high';
    ctx.drawImage(spr, ox-sw/2, oy-sh2, sw, sh2);
  }
  ctx.restore();

  // Flash de dano
  if(recebendo>0){
    ctx.save();ctx.globalAlpha=(recebendo/14)*.35;
    ctx.fillStyle='#ff2222';
    ctx.fillRect(ox-sw/2, oy-sh2, sw, sh2);
    ctx.restore();
  }

  drawMiniHP(ox, oy-sh2-8, luta.arHp, luta.arMaxHp,'#e74c3c','#ffe566');
}

function desenharPtolomeuLuta(x,y,atacando,recebendo,morto,t){
  if(!luta.ptVisible||morto) return;
  const bob  = Math.sin(t*.055+2)*.6;
  const shake= recebendo>0?(Math.random()-.5)*3:0;
  const ox=x+shake, oy=y+bob;
  const sw=70, sh2=124;

  // Detectar movimento
  const ptMovendo = Math.abs(luta.ptX - (luta._ptXprev||luta.ptX)) > 0.5;
  luta._ptXprev = luta.ptX;

  let sprKey;
  if(atacando)        sprKey = 'soco';
  else if(ptMovendo)  sprKey = (Math.floor(t/10)%2===0) ? 'walk1' : 'walk2';
  else                sprKey = (Math.floor(t/24)%2===0) ? 'stand' : 'walk1';

  const spr = _PT[sprKey];

  // Sombra
  ctx.fillStyle='rgba(0,0,0,.28)';
  ctx.beginPath();ctx.ellipse(ox,oy+3,18,4,0,0,Math.PI*2);ctx.fill();

  ctx.save();
  ctx.globalAlpha = recebendo>0 ? .55 : 1;

  // walk/stand olham para ESQUERDA — espelhar se jogador à DIREITA
  // soco olha para ESQUERDA — mesma lógica (não espelhar quando jogador à esquerda)
  const jogadorADireitaDePt = luta.playerX > luta.ptX;
  const ptDeveEspelhar = sprKey === 'soco' ? jogadorADireitaDePt : !jogadorADireitaDePt;
  if(ptDeveEspelhar){
    ctx.translate(ox,0); ctx.scale(-1,1); ctx.translate(-ox,0);
  }

  if(spr && spr.complete && spr.naturalWidth>0){
    ctx.imageSmoothingEnabled=true;
    ctx.imageSmoothingQuality='high';
    ctx.drawImage(spr, ox-sw/2, oy-sh2, sw, sh2);
  }
  ctx.restore();

  // Flash de dano
  if(recebendo>0){
    ctx.save();ctx.globalAlpha=(recebendo/14)*.35;
    ctx.fillStyle='#ff2222';
    ctx.fillRect(ox-sw/2, oy-sh2, sw, sh2);
    ctx.restore();
  }

  drawMiniHP(ox, oy-sh2-8, luta.ptHp, luta.ptMaxHp,'#e74c3c','#cc88ff');
}

function drawMiniHP(x,y,hp,maxHp,bg,fg){
  ctx.fillStyle='rgba(0,0,0,.5)';ctx.fillRect(x-31,y-1,62,8);
  ctx.fillStyle=bg+'55';ctx.fillRect(x-30,y,60,6);
  ctx.fillStyle=fg;ctx.fillRect(x-30,y,60*(hp/maxHp),6);
}

function desenharAliado(x,y,bodyCol,accentCol,t,idx){
  const bob=Math.sin(t*.06+idx)*.8;const ox=x,oy=y+bob;
  ctx.fillStyle='rgba(0,0,0,.22)';ctx.beginPath();ctx.ellipse(ox,oy+5,16,4,0,0,Math.PI*2);ctx.fill();
  r2(ox-12,oy-58,24,38,bodyCol);r2(ox-10,oy-72,20,16,accentCol);
  r2(ox-8,oy-70,16,12,'rgba(255,255,255,.14)');r2(ox-6,oy-69,5,4,'rgba(255,255,255,.35)');
  r2(ox-14,oy-46,4,22,bodyCol);r2(ox+10,oy-46,4,22,bodyCol);
  r2(ox-10,oy-20,9,22,'#dd3322');r2(ox+1,oy-20,9,22,'#dd3322');r2(ox-12,oy-22,24,4,'#ffaa00');
  ctx.save();ctx.globalAlpha=.22;
  const grd=ctx.createRadialGradient(ox,oy-30,4,ox,oy-30,32);
  grd.addColorStop(0,accentCol);grd.addColorStop(1,'transparent');
  ctx.fillStyle=grd;ctx.beginPath();ctx.arc(ox,oy-30,32,0,Math.PI*2);ctx.fill();ctx.restore();
}

function desenharAliadosLuta(t){
  if(!luta.aliadosVisible)return;
  desenharAliado(luta.ariscX,482,'#115533','#44eebb',t,0);
  desenharAliado(luta.copX,  482,'#553311','#ffaa44',t,1);
  desenharAliado(luta.galX,  482,'#113355','#44aaff',t,2);

}

function desenharTelaLuta(t){
  // Fundo: imagem do cenário
  if(_bgFase1.complete && _bgFase1.naturalWidth > 0){
    ctx.drawImage(_bgFase1, 0, 0, W, H);
  } else {
    ctx.fillStyle='#07071a'; ctx.fillRect(0,0,W,H);
    _bgFase1.onload = ()=>{};
  }
  if(flashTela>0){ctx.fillStyle=`rgba(255,255,255,${flashTela*.024})`;ctx.fillRect(0,0,W,H);}

  desenharAristotelesLuta(luta.arX,luta.arY,luta.arAtacando,luta.arRecebendo,luta.arHp<=0,t);
  desenharPtolomeuLuta(luta.ptX,luta.ptY,luta.ptAtacando,luta.ptRecebendo,luta.ptHp<=0,t);
  desenharAliadosLuta(t);
  desenharJogadorLuta(luta.playerX,luta.playerY,luta.playerAtacando,luta.playerRecebendo,t);

  particulas.forEach(p=>{const a=p.vida/p.maxVida;ctx.globalAlpha=a;ctx.fillStyle=p.cor;ctx.beginPath();ctx.arc(p.x,p.y,p.r*a,0,Math.PI*2);ctx.fill();});
  ctx.globalAlpha=1;

  // HUD
  ctx.fillStyle='rgba(0,0,0,.7)';ctx.fillRect(0,0,W,62);
  ctx.strokeStyle='rgba(0,229,255,.12)';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(0,62);ctx.lineTo(W,62);ctx.stroke();
  // jogador HP
  ctx.font="10px 'Orbitron'";ctx.fillStyle='#00e5ff';ctx.textAlign='left';ctx.fillText('JOGADOR',36,22);
  ctx.fillStyle='#220808';ctx.fillRect(36,28,230,16);
  // cor da barra muda conforme hp
  const hpRatio=luta.playerHp/luta.playerMaxHp;
  ctx.fillStyle=hpRatio>.5?'#2ecc71':hpRatio>.25?'#f39c12':'#e74c3c';
  ctx.fillRect(36,28,230*hpRatio,16);
  ctx.strokeStyle='rgba(0,229,255,.4)';ctx.lineWidth=1;ctx.strokeRect(36,28,230,16);
  ctx.fillStyle='rgba(255,255,255,.7)';ctx.font="8px 'Share Tech Mono'";ctx.fillText(Math.round(luta.playerHp)+'HP',40,40);
  // inimigos HP
  const nomeIn=luta.ptVisible?'AR. & PTOLOMEU':'ARISTÓTELES';
  ctx.font="10px 'Orbitron'";ctx.fillStyle='#ff4081';ctx.textAlign='right';ctx.fillText(nomeIn,764,22);
  const mediaHp=luta.ptVisible?Math.max(luta.arHp,0)*.5+Math.max(luta.ptHp,0)*.5:luta.arHp;
  ctx.fillStyle='#220808';ctx.fillRect(534,28,230,16);
  ctx.fillStyle='#e74c3c';ctx.fillRect(534+230*(1-mediaHp/100),28,230*(mediaHp/100),16);
  ctx.strokeStyle='rgba(255,64,129,.4)';ctx.lineWidth=1;ctx.strokeRect(534,28,230,16);
  ctx.textAlign='right';ctx.fillStyle='rgba(255,255,255,.7)';ctx.font="8px 'Share Tech Mono'";ctx.fillText(Math.round(mediaHp)+'HP',760,40);
  // VS
  ctx.save();ctx.font="bold 16px 'Orbitron'";ctx.fillStyle='#ffe566';ctx.textAlign='center';
  ctx.shadowColor='#ff9900';ctx.shadowBlur=14;ctx.fillText('VS',W/2,36);ctx.shadowBlur=0;ctx.restore();
  // round badge
  const fl=['','ROUND 1','ROUND 2','ROUND 2 – DUPLA!','REFORÇO HELIOCÊNTRICO!','✦ GOLPE ESPECIAL ✦',''][luta.fase]||'';
  if(fl){ctx.font="8px 'Press Start 2P'";ctx.fillStyle='rgba(255,229,100,.75)';ctx.textAlign='center';ctx.fillText(fl,W/2,H-22);}
  ctx.font="7px 'Share Tech Mono'";ctx.fillStyle='rgba(0,229,255,.32)';ctx.textAlign='center';
  ctx.fillText(luta.msg||'',W/2,H-8);
}
